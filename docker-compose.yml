services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: wrong_book
      POSTGRES_USER: wb_user
      POSTGRES_PASSWORD: wb_pass_2024
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  api:
    build: .
    ports: ["8000:8000"]
    depends_on: [db, redis]
    environment:
      DATABASE_URL: postgresql+asyncpg://wb_user:wb_pass_2024@db:5432/wrong_book
      REDIS_URL: redis://redis:6379/0
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_API_BASE: ${LLM_API_BASE:-https://api.deepseek.com/v1}
      LLM_MODEL: ${LLM_MODEL:-deepseek-v4-pro}
      JWT_SECRET: change-me-in-production
      AES_KEY: change-me-32bytes-secret-key-ok!
      DEV_MODE: "true"
      DEBUG_DATA_RESET_CONFIRMATION_PHRASE: ${DEBUG_DATA_RESET_CONFIRMATION_PHRASE:-CLEAR_DEBUG_BUSINESS_DATA}
      UPLOAD_DIR: /app/uploads
      PDF_DIR: /app/pdfs
      PIP_CACHE_DIR: /root/.cache/pip
    volumes:
      - pip_cache:/root/.cache/pip
      - ./app:/app/app
      - ./alembic.ini:/app/alembic.ini
      - ./alembic:/app/alembic
      - ./templates:/app/templates
      - ./tests:/app/tests
      - uploads:/app/uploads
      - pdfs:/app/pdfs

  worker:
    build:
      context: .
      args:
        LOCAL_OCR_ENGINE: ${LOCAL_OCR_ENGINE:-onnxruntime}
        LOCAL_OCR_MODEL_VERSION: ${LOCAL_OCR_MODEL_VERSION:-PP-OCRv5}
        LOCAL_OCR_MODEL_TYPE: ${LOCAL_OCR_MODEL_TYPE:-mobile}
        LOCAL_OCR_MODEL_PATH: ${LOCAL_OCR_MODEL_PATH:-/opt/rapidocr-models}
    command: celery -A app.tasks.celery_app worker --loglevel=info
    depends_on: [db, redis]
    environment:
      DATABASE_URL: postgresql+asyncpg://wb_user:wb_pass_2024@db:5432/wrong_book
      REDIS_URL: redis://redis:6379/0
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_API_BASE: ${LLM_API_BASE:-https://api.deepseek.com/v1}
      LLM_MODEL: ${LLM_MODEL:-deepseek-v4-pro}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY}
      MINIMAX_API_HOST: ${MINIMAX_API_HOST:-https://api.minimaxi.com}
      MINIMAX_VISION_TIMEOUT_SECONDS: ${MINIMAX_VISION_TIMEOUT_SECONDS:-60}
      MINIMAX_VISION_MAX_RETRIES: ${MINIMAX_VISION_MAX_RETRIES:-2}
      MINIMAX_VISION_RETRY_DELAY_SECONDS: ${MINIMAX_VISION_RETRY_DELAY_SECONDS:-1}
      MINIMAX_CONFIDENCE_THRESHOLD: ${MINIMAX_CONFIDENCE_THRESHOLD:-0.85}
      MINIMAX_MARK_CONFIDENCE_THRESHOLD: ${MINIMAX_MARK_CONFIDENCE_THRESHOLD:-0.85}
      MINIMAX_LOCALIZATION_CONFIDENCE_THRESHOLD: ${MINIMAX_LOCALIZATION_CONFIDENCE_THRESHOLD:-0.85}
      MINIMAX_LOCALIZATION_MAX_AREA_RATIO: ${MINIMAX_LOCALIZATION_MAX_AREA_RATIO:-0.35}
      QUESTION_CROP_CONTEXT_PADDING_RATIO: ${QUESTION_CROP_CONTEXT_PADDING_RATIO:-0.15}
      MARK_RED_PIXEL_MIN_RATIO: ${MARK_RED_PIXEL_MIN_RATIO:-0.005}
      MARK_RED_PIXEL_EXPANSION_RATIO: ${MARK_RED_PIXEL_EXPANSION_RATIO:-0.08}
      MINIMAX_IMAGE_MAX_EDGE: ${MINIMAX_IMAGE_MAX_EDGE:-2048}
      MINIMAX_IMAGE_JPEG_QUALITY: ${MINIMAX_IMAGE_JPEG_QUALITY:-90}
      LOCAL_OCR_ENABLED: ${LOCAL_OCR_ENABLED:-true}
      LOCAL_OCR_ENGINE: ${LOCAL_OCR_ENGINE:-onnxruntime}
      LOCAL_OCR_VERSION: ${LOCAL_OCR_VERSION:-3.9.1}
      LOCAL_OCR_MODEL_VERSION: ${LOCAL_OCR_MODEL_VERSION:-PP-OCRv5}
      LOCAL_OCR_MODEL_TYPE: ${LOCAL_OCR_MODEL_TYPE:-mobile}
      LOCAL_OCR_MODEL_PATH: ${LOCAL_OCR_MODEL_PATH:-/opt/rapidocr-models}
      LOCAL_OCR_LINE_CONFIDENCE_THRESHOLD: ${LOCAL_OCR_LINE_CONFIDENCE_THRESHOLD:-0.85}
      LOCAL_OCR_MIN_EFFECTIVE_CHARACTERS: ${LOCAL_OCR_MIN_EFFECTIVE_CHARACTERS:-2}
      LOCAL_OCR_SUPPORT_SIMILARITY_THRESHOLD: ${LOCAL_OCR_SUPPORT_SIMILARITY_THRESHOLD:-0.8}
      LOCAL_OCR_CONTRADICTION_SIMILARITY_THRESHOLD: ${LOCAL_OCR_CONTRADICTION_SIMILARITY_THRESHOLD:-0.9}
      TAG_ALIAS_CONFIG_PATH: ${TAG_ALIAS_CONFIG_PATH:-/app/config/tag-aliases.json}
      QUESTION_SOFT_DELETE_RETENTION_DAYS: ${QUESTION_SOFT_DELETE_RETENTION_DAYS:-30}
      QUESTION_CLEANUP_INTERVAL_SECONDS: ${QUESTION_CLEANUP_INTERVAL_SECONDS:-86400}
      QUESTION_CLEANUP_BATCH_SIZE: ${QUESTION_CLEANUP_BATCH_SIZE:-100}
      UPLOAD_DIR: /app/uploads
    volumes:
      - ./app:/app/app
      - ./config:/app/config:ro
      - uploads:/app/uploads

  beat:
    build: .
    command: celery -A app.tasks.celery_app beat --loglevel=info
    depends_on: [db, redis]
    environment:
      DATABASE_URL: postgresql+asyncpg://wb_user:wb_pass_2024@db:5432/wrong_book
      REDIS_URL: redis://redis:6379/0
      QUESTION_SOFT_DELETE_RETENTION_DAYS: ${QUESTION_SOFT_DELETE_RETENTION_DAYS:-30}
      QUESTION_CLEANUP_INTERVAL_SECONDS: ${QUESTION_CLEANUP_INTERVAL_SECONDS:-86400}
      QUESTION_CLEANUP_BATCH_SIZE: ${QUESTION_CLEANUP_BATCH_SIZE:-100}
    volumes:
      - ./app:/app/app

volumes:
  pgdata:
  uploads:
  pdfs:
  pip_cache:
